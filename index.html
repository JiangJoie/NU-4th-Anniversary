<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>4週年 animate cafe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-purple: #bc13fe;
            --bg-dark: #0a0015;
            --card-bg: rgba(20, 0, 40, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                linear-gradient(rgba(18, 0, 36, 0.9), rgba(10, 0, 21, 0.9)),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.03) 0px, rgba(255, 255, 255, 0.03) 1px, transparent 1px, transparent 2px);
            background-size: 100% 100%, 100% 4px;
            color: #fff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* 隱藏原生數字箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            -moz-appearance: textfield;
        }

        #app {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            padding-bottom: 140px;
        }

        #capture-area {
            padding: 20px;
            background: transparent;
        }

        header {
            text-align: center;
            padding: 40px 0 20px 0;
            letter-spacing: 4px;
        }

        header h1 {
            font-size: 1.8rem;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        }

        /* --- 分頁標籤 --- */
        .tabs {
            display: flex;
            gap: 15px;
            margin: 25px 0;
            position: sticky;
            top: 10px;
            z-index: 50;
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: #888;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 2px;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .tab-btn:hover {
            border-color: var(--neon-blue);
            color: #ccc;
            background: rgba(0, 255, 255, 0.1);
        }

        .tab-btn.active {
            border-color: var(--neon-blue);
            border-width: 2px;
            color: #fff;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.2), rgba(0, 255, 255, 0.1));
            box-shadow:
                0 0 15px rgba(0, 255, 255, 0.5),
                0 0 30px rgba(0, 255, 255, 0.2),
                inset 0 0 15px rgba(0, 255, 255, 0.1);
            transform: translateY(-3px);
            text-shadow: 0 0 10px var(--neon-blue);
            letter-spacing: 3px;
        }

        /* --- 卡片與內容 --- */
        .item-list {
            display: none;
            flex-direction: column;
            gap: 18px;
        }

        .item-list.active {
            display: flex;
        }

        #simple-goods-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .item-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--neon-blue);
            padding: 16px;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .item-name {
            font-size: 1rem;
            color: #eee;
            font-weight: 600;
        }

        .item-price {
            color: var(--neon-pink);
            font-family: monospace;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            padding: 10px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        select,
        input {
            background: #000;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
            outline: none;
        }

        select:focus {
            border-color: var(--neon-blue);
        }

        /* --- 數字控制組 --- */
        .number-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .btn-qty {
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

        .btn-qty:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        .qty-input-styled {
            width: 60px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-bottom: 1px solid var(--neon-blue);
            color: #fff;
            text-align: center;
            font-size: 1.2rem;
            font-family: monospace;
            outline: none;
        }

        .btn-add-row {
            background: transparent;
            border: 1px dashed var(--neon-purple);
            color: var(--neon-purple);
            padding: 10px;
            width: 100%;
            cursor: pointer;
            margin-top: 8px;
            font-weight: bold;
            border-radius: 4px;
        }

        /* --- 底部與截圖 --- */
        .calculator-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 500px;
            background: rgba(10, 0, 21, 0.95);
            border-top: 2px solid var(--neon-pink);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .action-btn {
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-pink));
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
        }

        .total-val {
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-pink);
        }

        #screenshot-total {
            display: none;
            margin-top: 40px;
            padding: 25px;
            border: 2px solid var(--neon-blue);
            text-align: right;
        }

        .is-screenshot .tabs,
        .is-screenshot .btn-add-row,
        .is-screenshot .calculator-footer,
        .is-screenshot .btn-del-row {
            display: none !important;
        }

        .is-screenshot #screenshot-total {
            display: block;
        }

        /* --- 自定義彈窗樣式 --- */
        #custom-alert {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(8px);
        }

        .alert-box {
            background: #1a0033;
            border: 2px solid var(--neon-pink);
            padding: 30px;
            border-radius: 8px;
            max-width: 300px;
            width: 80%;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.3);
        }

        .alert-msg {
            margin-bottom: 25px;
            line-height: 1.6;
            font-weight: bold;
            color: #fff;
        }

        .alert-btn {
            background: var(--neon-blue);
            border: none;
            color: #000;
            padding: 10px 30px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <div id="custom-alert">
        <div class="alert-box">
            <div id="alert-msg" class="alert-msg">提示訊息</div>
            <button class="alert-btn" onclick="closeAlert()">確認</button>
        </div>
    </div>

    <div id="app">
        <div id="capture-area">
            <header>
                <h1>4週年 animate cafe 品項</h1>
            </header>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('food')">飲料 & 餅乾</button>
                <button class="tab-btn" onclick="showTab('goods')">周邊</button>
            </div>

            <div id="tab-food" class="item-list active">
                <div class="item-card" data-group="drink1">
                    <div class="card-header"><span class="item-name">前半段飲料 (限3)</span><span
                            class="item-price">$180</span></div>
                    <div class="rows-container" id="drink1-rows"></div>
                    <button class="btn-add-row" onclick="addRow('drink1')">+ 新增飲料</button>
                </div>

                <div class="item-card" data-group="drink2">
                    <div class="card-header"><span class="item-name">後半段飲料 (限3)</span><span
                            class="item-price">$180</span></div>
                    <div class="rows-container" id="drink2-rows"></div>
                    <button class="btn-add-row" onclick="addRow('drink2')">+ 新增飲料</button>
                </div>

                <div class="item-card" data-group="print-drink">
                    <div class="card-header"><span class="item-name">印刷飲料 (限3)</span><span
                            class="item-price">$180</span></div>
                    <div class="rows-container" id="print-drink-rows"></div>
                    <button class="btn-add-row" onclick="addRow('print-drink')">+ 新增飲料</button>
                </div>

                <div class="item-card" data-group="cookie">
                    <div class="card-header"><span class="item-name">印刷糖霜餅乾 (限1)</span><span
                            class="item-price">$180</span></div>
                    <div class="rows-container" id="cookie-rows"></div>
                    <button class="btn-add-row" id="btn-add-cookie" onclick="addRow('cookie')">+ 新增餅乾</button>
                </div>

                <div class="item-card" id="coaster-card" style="border-left-color: gold;">
                    <div class="card-header">
                        <span class="item-name">加購：壓克力杯墊</span>
                        <span class="item-price">$150</span>
                    </div>
                    <div class="number-control">
                        <button type="button" class="btn-qty" onclick="changeQty('coaster-qty', -1, 99)">−</button>

                        <input type="number" id="coaster-qty" class="qty-input-styled" value="0" min="0" disabled
                            oninput="validateCoaster(this)">

                        <button type="button" class="btn-qty" onclick="changeQty('coaster-qty', 1, 99)">+</button>
                    </div>
                    <div style="margin-top: 10px;">
                        <span id="coaster-limit-info"
                            style="color:rgb(255, 140, 140); font-size: 0.75rem; font-weight: 600;">
                            ※ 點飲料及餅乾後才可加購
                        </span>
                    </div>
                </div>
            </div>

            <div id="tab-goods" class="item-list">
                <div id="simple-goods-container"></div>

                <div class="item-card" data-group="stand">
                    <div class="card-header"><span class="item-name">立繪壓克力立牌</span><span class="item-price">$650</span>
                    </div>
                    <div class="rows-container" id="stand-rows"></div>
                    <button class="btn-add-row" onclick="addRow('stand')">+ 新增角色</button>
                </div>

                <div class="item-card" data-group="towel">
                    <div class="card-header"><span class="item-name">立繪毛巾</span><span class="item-price">$80</span>
                    </div>
                    <div class="rows-container" id="towel-rows"></div>
                    <button class="btn-add-row" onclick="addRow('towel')">+ 新增角色</button>
                </div>

                <div class="item-card" data-group="scroll">
                    <div class="card-header"><span class="item-name">立繪掛軸</span><span class="item-price">$2700</span>
                    </div>
                    <div class="rows-container" id="scroll-rows"></div>
                    <button class="btn-add-row" onclick="addRow('scroll')">+ 新增角色</button>
                </div>

                <div class="item-card" data-group="big-stand">
                    <div class="card-header"><span class="item-name">放大版立繪立牌</span><span class="item-price">$1850</span>
                    </div>
                    <div class="rows-container" id="big-stand-rows"></div>
                    <button class="btn-add-row" onclick="addRow('big-stand')">+ 新增角色</button>
                </div>

                <div class="item-card">
                    <div class="card-header"><span class="item-name">伊得超大型立牌</span><span class="item-price">$1350</span>
                    </div>
                    <div class="number-control">
                        <button type="button" class="btn-qty" onclick="changeQty('qty-big-eiden', -1, 99)">−</button>
                        <input type="number" id="qty-big-eiden" class="qty-input-styled goods-qty" data-price="1350"
                            data-max="99" value="0" min="0" oninput="validateAndCalc(this)">
                        <button type="button" class="btn-qty" onclick="changeQty('qty-big-eiden', 1, 99)">+</button>
                    </div>
                </div>
            </div>

            <div id="screenshot-total">
                <div class="total-label">總金額：NT$</div>
                <div style="font-size: 2rem; font-weight: bold; color: var(--neon-blue);">NT$ <span
                        id="print-total-price">0</span></div>
            </div>
        </div>

        <footer class="calculator-footer">
            <!-- <button class="action-btn" id="btn-capture">產出清單圖片</button> -->
            <button class="action-btn" onclick="exportToExcel()">產出Excel清單</button>
            <div class="total-container">
                <div class="total-label">總金額:</div>
                <div class="total-val">$<span id="total-price">0</span></div>
            </div>
        </footer>
    </div>

    <script>
        const roles_all = ["伊得", "八雲", "艾德蒙特", "奧利文", "崑西", "玖夜", "可爾", "布儡", "啖天", "歛", "艾斯特", "墨菲", "休伊", "環"];
        const roles_half1 = ["01 伊得", "02 八雲", "03 艾德蒙特", "04 奧利文", "05 墨菲", "06 艾斯特", "07 休伊"];
        const roles_half2 = ["01 伊得", "02 崑西", "03 玖夜", "04 可爾", "05 布儡", "06 啖天", "07 歛", "08 環"];
        const drinks = ["冰紅茶", "冰抹茶歐雷", "冰鮮奶茶", "冰可可歐雷"];
        const toppings = ["無配料", "椰果", "爆爆珠", "黑糖珍珠"];

        const goods_config = [
            { name: "CoLotta 克羅塔", price: 300, max: 10 },
            { name: "名片風小卡", price: 200, max: 10 },
            { name: "精裝立繪寫真卡", price: 300, max: 10 },
            { name: "心型胸針", price: 180, max: 10 },
            { name: "壓克力水晶相框", price: 800, max: 10 },
            { name: "貼紙套組", price: 250, max: 10 },
            { name: "簽名小卡", price: 150, max: 10 },
            { name: "裝飾卡套", price: 200, max: 10 }
        ];

        // 彈窗控制
        function showAlert(msg) {
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('custom-alert').style.display = 'flex';
        }
        function closeAlert() {
            document.getElementById('custom-alert').style.display = 'none';
        }

        function init() {
            const container = document.getElementById('simple-goods-container');
            container.innerHTML = '';
            goods_config.forEach((item, index) => {
                const inputId = `qty-item-${index}`;
                container.innerHTML += `
                <div class="item-card">
                    <div class="card-header">
                        <span class="item-name">${item.name} (限${item.max})</span>
                        <span class="item-price">$${item.price}</span>
                    </div>
                    <div class="number-control">
                        <button class="btn-qty" onclick="changeQty('${inputId}', -1, ${item.max})">−</button>
                        <input type="number" id="${inputId}" class="qty-input-styled goods-qty" 
                            data-price="${item.price}" data-max="${item.max}" value="0" min="0" oninput="validateAndCalc(this)">
                        <button class="btn-qty" onclick="changeQty('${inputId}', 1, ${item.max})">+</button>
                    </div>
                </div>`;
            });
        }

        function showTab(tab) {
            document.querySelectorAll('.item-list').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function addRow(type) {
            const container = document.getElementById(type + '-rows');
            const count = container.children.length;

            if ((type.includes('drink') && count >= 3) || (type === 'cookie' && count >= 1)) {
                showAlert("已達該項目最大選購筆數");
                return;
            }

            const selectedRoles = getSelectedRoles(type);
            const availableRoles = roles_all.filter(role => !selectedRoles.includes(role));

            if (['stand', 'towel'].includes(type) && availableRoles.length === 0) {
                showAlert("所有角色皆已加入清單！");
                return;
            }

            const div = document.createElement('div');
            div.className = 'controls';

            let html = '';
            if (type === 'drink1') html = createSelect(roles_half1, type);
            else if (type === 'drink2') html = createSelect(roles_half2, type);
            else if (type === 'print-drink') {
                html = createSelect(roles_all, type) + createSelect(drinks, type) + createSelect(toppings, type);
            } else {
                const optionsToShow = ['stand', 'towel'].includes(type) ? availableRoles : roles_all;
                html = createSelect(optionsToShow, type);
            }

            html += `<button class="btn-del-row" onclick="this.parentElement.remove(); refreshOptions('${type}'); calculateTotal();" style="color:red; background:none; border:none; cursor:pointer; font-size:1.2rem; margin-left:auto;">✕</button>`;
            div.innerHTML = html;
            container.appendChild(div);

            refreshOptions(type);
            calculateTotal();
        }

        function createSelect(options, type) {
            return `<select class="role-select" data-type="${type}" onchange="refreshOptions('${type}'); calculateTotal();">
                ${options.map(o => `<option value="${o}">${o}</option>`).join('')}
            </select>`;
        }

        function getSelectedRoles(type) {
            const container = document.getElementById(type + '-rows');
            if (!container) return [];
            const selects = container.querySelectorAll('.role-select');
            return Array.from(selects).map(s => s.value);
        }

        function refreshOptions(type) {
            if (type !== 'stand' && type !== 'towel') return;
            const container = document.getElementById(type + '-rows');
            const selects = container.querySelectorAll('.role-select');
            const currentSelections = Array.from(selects).map(s => s.value);

            selects.forEach((thisSelect) => {
                const thisValue = thisSelect.value;
                let newHtml = '';
                roles_all.forEach(role => {
                    const isPickedByOthers = currentSelections.some((val, idx) => val === role && selects[idx] !== thisSelect);
                    if (!isPickedByOthers) {
                        newHtml += `<option value="${role}" ${role === thisValue ? 'selected' : ''}>${role}</option>`;
                    }
                });
                thisSelect.innerHTML = newHtml;
            });
        }

        function changeQty(id, delta, max) {
            const input = document.getElementById(id);
            let val = (parseInt(input.value) || 0) + delta;
            if (val < 0) val = 0;
            if (val > max) val = max;
            input.value = val;
            calculateTotal();
        }

        function validateAndCalc(input) {
            const max = parseInt(input.dataset.max);
            let val = parseInt(input.value);
            if (isNaN(val) || val < 0) val = 0;
            else if (val > max) val = max;
            input.value = val;
            calculateTotal();
        }

        function validateCoaster(input) {
            const foodCount = document.getElementById('drink1-rows').children.length +
                document.getElementById('drink2-rows').children.length +
                document.getElementById('print-drink-rows').children.length +
                document.getElementById('cookie-rows').children.length;
            if (parseInt(input.value) > foodCount) input.value = foodCount;
            if (parseInt(input.value) < 0) input.value = 0;
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            const drinkCount = document.getElementById('drink1-rows').children.length +
                document.getElementById('drink2-rows').children.length +
                document.getElementById('print-drink-rows').children.length;
            const cookieCount = document.getElementById('cookie-rows').children.length;
            const totalFood = drinkCount + cookieCount;

            const coasterInput = document.getElementById('coaster-qty');
            const coasterHint = document.getElementById('coaster-limit-info');

            if (totalFood > 0) {
                coasterInput.disabled = false;
                if (parseInt(coasterInput.value) > totalFood) coasterInput.value = totalFood;
                coasterHint.innerText = `● 目前加購上限：${totalFood} 份`;
                coasterHint.style.color = "var(--neon-blue)";
            } else {
                coasterInput.value = 0;
                coasterInput.disabled = true;
                coasterHint.innerText = `※ 點飲料及餅乾後才可加購`;
                coasterHint.style.color = "rgb(255, 140, 140)";
                coasterHint.style.fontSize = "0.75rem";
                coasterHint.style.fontWeight = "600";
            }

            total += totalFood * 180;
            total += (parseInt(coasterInput.value) || 0) * 150;

            document.querySelectorAll('.goods-qty').forEach(input => {
                total += (parseInt(input.value) || 0) * (parseInt(input.dataset.price) || 0);
            });

            const groups = [{ id: 'stand-rows', p: 650 }, { id: 'towel-rows', p: 80 }, { id: 'scroll-rows', p: 2700 }, { id: 'big-stand-rows', p: 1850 }];
            groups.forEach(g => {
                const el = document.getElementById(g.id);
                if (el) total += el.children.length * g.p;
            });

            document.getElementById('total-price').innerText = total.toLocaleString();
            document.getElementById('print-total-price').innerText = total.toLocaleString();
        }

        function downloadReceipt() {
            // 1. 建立一個虛擬的 div 用來排版 (不顯示在畫面上)
            const printArea = document.createElement('div');
            printArea.style.cssText = `
                width: 400px; 
                padding: 30px; 
                background-color: #1a1a1a; 
                color: #fff; 
                font-family: "Microsoft JhengHei", sans-serif;
                position: absolute; 
                left: -9999px;
            `;

            // 2. 標題
            let htmlContent = `
                <div style="text-align: center; border-bottom: 2px solid gold; padding-bottom: 15px; margin-bottom: 20px;">
                    <h2 style="color: gold; margin: 0;">【4週年購物清單】</h2>
                </div>
            `;

            let totalAmount = 0;
            let hasItems = false;

            // 3. 精準抓取：遍歷所有的 item-card
            const cards = document.querySelectorAll('.item-card');

            cards.forEach(card => {
                const input = card.querySelector('input[type="number"]');
                const qty = parseInt(input.value) || 0;

                if (qty > 0) {
                    hasItems = true;
                    const name = card.querySelector('.item-name').innerText;
                    const priceText = card.querySelector('.item-price').innerText.replace('$', '').replace(/,/g, '');
                    const price = parseInt(priceText);
                    const subtotal = price * qty;
                    totalAmount += subtotal;

                    htmlContent += `
                        <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 1.1rem;">
                            <span>${name} <small style="color: #aaa;">x${qty}</small></span>
                            <span style="color: #00ffcc;">$${subtotal}</span>
                        </div>
                    `;
                }
            });

            if (!hasItems) {
                alert("尚未勾選任何品項喔！");
                return;
            }

            // 4. 結尾總計
            htmlContent += `
                <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #444; text-align: right;">
                    <span style="font-size: 1.2rem;">總計金額：</span>
                    <span style="font-size: 1.5rem; color: gold; font-weight: bold;">$${totalAmount}</span>
                </div>
                <div style="text-align: center; margin-top: 20px; color: #888; font-size: 0.8rem;">
                    感謝您的參與，期待下次再見！
                </div>
            `;

            printArea.innerHTML = htmlContent;
            document.body.appendChild(printArea);

            // 5. 使用 html2canvas 轉成圖片
            html2canvas(printArea, {
                useCORS: true,        // 解決跨網域圖片問題
                allowTaint: true,
                backgroundColor: "#1a1a1a",
                scale: 2              // 讓圖片更清晰
            }).then(canvas => {
                const link = document.createElement('a');
                link.style.display = 'none';
                link.href = canvas.toDataURL("image/png");
                link.download = '4週年購物清單.png'; // 強制設定檔名
                document.body.appendChild(link);
                link.click();

                // 清理環境
                document.body.removeChild(link);
                document.body.removeChild(printArea);
            });
        }

        function exportToExcel() {
            const data = [["品項名稱", "選擇內容", "單價", "數量", "小計"]];
            let totalAmount = 0;
            let hasItems = false;

            // --- 1. 多行選擇型品項（每列單獨一行，顯示選單內容）---
            const rowGroups = [
                { id: 'drink1-rows', name: '前半段飲料', price: 180 },
                { id: 'drink2-rows', name: '後半段飲料', price: 180 },
                { id: 'print-drink-rows', name: '印刷飲料', price: 180 },
                { id: 'cookie-rows', name: '印刷糖霜餅乾', price: 180 },
                { id: 'stand-rows', name: '立繪壓克力立牌', price: 650 },
                { id: 'towel-rows', name: '立繪毛巾', price: 80 },
                { id: 'scroll-rows', name: '立繪掛軸', price: 2700 },
                { id: 'big-stand-rows', name: '放大版立繪立牌', price: 1850 },
            ];

            rowGroups.forEach(g => {
                const container = document.getElementById(g.id);
                if (!container) return;
                const rows = container.children;
                if (rows.length === 0) return;

                // 每一列（每筆選擇）單獨輸出一行
                Array.from(rows).forEach(row => {
                    const selects = row.querySelectorAll('select');
                    // 把該列所有下拉選單的值合併，例如「伊得 / 冰紅茶 / 椰果」
                    const selectedValues = Array.from(selects)
                        .map(s => s.value)
                        .join(' / ');

                    hasItems = true;
                    totalAmount += g.price;
                    data.push([g.name, selectedValues, g.price, 1, g.price]);
                });
            });

            // --- 2. 數字輸入型品項（杯墊、周邊、超大型立牌）---
            document.querySelectorAll('input.qty-input-styled').forEach(input => {
                const qty = parseInt(input.value) || 0;
                if (qty > 0) {
                    const card = input.closest('.item-card');
                    if (!card) return;
                    const nameEl = card.querySelector('.item-name');
                    const priceEl = card.querySelector('.item-price');
                    if (!nameEl || !priceEl) return;

                    const name = nameEl.innerText.trim();
                    const price = parseInt(priceEl.innerText.replace(/[^0-9]/g, '')) || 0;
                    const subtotal = price * qty;
                    hasItems = true;
                    totalAmount += subtotal;
                    data.push([name, "—", price, qty, subtotal]);
                }
            });

            if (!hasItems) {
                showAlert("尚未選擇任何品項喔！");
                return;
            }

            data.push([], ["", "", "", "總計金額：", totalAmount]);

            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "購物清單");
            XLSX.writeFile(wb, "4週年購物清單.xlsx");
        }

        document.getElementById('btn-capture').addEventListener('click', function () {
            const area = document.getElementById('capture-area');
            area.classList.add('is-screenshot');
            html2canvas(area, { backgroundColor: "#0a0015", scale: 2, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Neon-Rush-Order.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                area.classList.remove('is-screenshot');
            });
        });

        init();
    </script>
